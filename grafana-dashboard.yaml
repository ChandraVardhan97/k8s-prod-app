apiVersion: v1
kind: ConfigMap
metadata:
  name: bookshelf-api-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  bookshelf-api.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "title": "Request Rate (req/s)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{namespace=\"bookshelf\"}[5m])) by (method)",
              "legendFormat": "{{method}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "reqps" }
          }
        },
        {
          "title": "Error Rate (5xx)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{namespace=\"bookshelf\", status=~\"5..\"}[5m]))",
              "legendFormat": "5xx errors/s",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "reqps", "color": { "mode": "fixed", "fixedColor": "red" } }
          }
        },
        {
          "title": "Request Latency (P50 / P95 / P99)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket{namespace=\"bookshelf\"}[5m])) by (le))",
              "legendFormat": "P50",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{namespace=\"bookshelf\"}[5m])) by (le))",
              "legendFormat": "P95",
              "refId": "B"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{namespace=\"bookshelf\"}[5m])) by (le))",
              "legendFormat": "P99",
              "refId": "C"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "s" }
          }
        },
        {
          "title": "Active Pods",
          "type": "stat",
          "gridPos": { "h": 8, "w": 6, "x": 12, "y": 8 },
          "targets": [
            {
              "expr": "kube_deployment_status_replicas_available{namespace=\"bookshelf\", deployment=~\".*bookshelf.*\"}",
              "legendFormat": "Running",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Books Created (Total)",
          "type": "stat",
          "gridPos": { "h": 8, "w": 6, "x": 18, "y": 8 },
          "targets": [
            {
              "expr": "sum(books_created_total{namespace=\"bookshelf\"})",
              "legendFormat": "Total",
              "refId": "A"
            }
          ]
        },
        {
          "title": "CPU Usage",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"bookshelf\", container=\"bookshelf-api\"}[5m])) by (pod)",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "percentunit" }
          }
        },
        {
          "title": "Memory Usage",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{namespace=\"bookshelf\", container=\"bookshelf-api\"}) by (pod)",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "bytes" }
          }
        },
        {
          "title": "Requests by Status Code",
          "type": "piechart",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 24 },
          "targets": [
            {
              "expr": "sum(increase(http_requests_total{namespace=\"bookshelf\"}[1h])) by (status)",
              "legendFormat": "{{status}}",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Requests by Endpoint",
          "type": "table",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 24 },
          "targets": [
            {
              "expr": "sum(increase(http_requests_total{namespace=\"bookshelf\"}[1h])) by (endpoint, method)",
              "legendFormat": "{{method}} {{endpoint}}",
              "refId": "A",
              "format": "table",
              "instant": true
            }
          ]
        }
      ],
      "schemaVersion": 39,
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "title": "Bookshelf API",
      "uid": "bookshelf-api-dashboard"
    }
